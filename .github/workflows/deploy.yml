name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://langitkode:$HF_TOKEN@huggingface.co/spaces/langitkode/kembang-ai-backend main
